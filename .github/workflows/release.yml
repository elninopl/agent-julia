name: Release

# Tag-driven: push a vX.Y.Z tag on main -> test -> publish to npm -> GitHub Release.
# Local flow: bump version, commit, `git tag vX.Y.Z`, `git push --follow-tags`.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # create the GitHub Release
  id-token: write # npm provenance (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      # Guard: the git tag must match package.json version, so we never publish a
      # mismatched artifact.
      - name: Verify tag matches package version
        run: |
          PKG="v$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME}"
          echo "package=$PKG tag=$TAG"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG"
            exit 1
          fi

      - run: npm run typecheck
      - run: npm run build
      - run: npm test

      # No token: npm exchanges a short-lived OIDC token with the registry. The
      # package's Trusted Publisher (repo + this workflow) must be configured on
      # npmjs first. Provenance is attached automatically on OIDC publish.
      #
      # Publish through npx with a pinned npm rather than `npm install -g
      # npm@latest`: overwriting the toolcache npm in place can leave a partial
      # install (v0.1.31's first run died on a missing `sigstore` after exactly
      # that), while npx runs a complete, freshly fetched copy. OIDC needs
      # npm >= 11.5.1.
      - name: Publish to npm (Trusted Publishing)
        run: npx -y npm@11 publish --access public

      - name: Extract release notes
        run: node scripts/changelog-extract.mjs "${GITHUB_REF_NAME}" > RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
