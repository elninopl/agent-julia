name: Release

# Tag-driven: push a vX.Y.Z tag on main -> test -> publish to npm -> GitHub Release.
# Local flow: bump version, commit, `git tag vX.Y.Z`, `git push --follow-tags`.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # create the GitHub Release
  id-token: write # npm provenance (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      # Guard: the git tag must match package.json version, so we never publish a
      # mismatched artifact.
      - name: Verify tag matches package version
        run: |
          PKG="v$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME}"
          echo "package=$PKG tag=$TAG"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG"
            exit 1
          fi

      - run: npm run typecheck
      - run: npm run build
      - run: npm test

      # Trusted Publishing (OIDC) needs npm >= 11.5.1; Node 22 ships an older npm.
      - name: Update npm for OIDC trusted publishing
        run: npm install -g npm@latest

      # No token: npm exchanges a short-lived OIDC token with the registry. The
      # package's Trusted Publisher (repo + this workflow) must be configured on
      # npmjs first. Provenance is attached automatically on OIDC publish.
      - name: Publish to npm (Trusted Publishing)
        run: npm publish --access public

      - name: Extract release notes
        run: node scripts/changelog-extract.mjs "${GITHUB_REF_NAME}" > RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
