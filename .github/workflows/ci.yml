name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [24]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      # better-sqlite3 is a native module; npm ci compiles it (build tools are
      # preinstalled on ubuntu-latest).
      - run: npm ci

      - run: npm run typecheck
      - run: npm run build
      - run: npm test
